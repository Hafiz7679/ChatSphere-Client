<!DOCTYPE html>
<html lang="en">
  <head>
    <script>
      (function() {
        var theme = 'dark';
        try { theme = localStorage.getItem('themeMode') || 'system'; } catch(e) {}
        if (theme === 'system') {
          theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        if (theme === 'dark') {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <meta charset="utf-8" />
    <link rel="icon" href="/favicon.ico" />
